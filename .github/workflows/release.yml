name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            asset_name: gcs-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            asset_name: gcs-windows-x86_64.exe
          - os: macos-13
            target: macos-x86_64
            asset_name: gcs-macos-x86_64
          - os: macos-14
            target: macos-arm64
            asset_name: gcs-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build Binary
        run: |
          python -m PyInstaller --clean --onefile --name gcs gcs_main.py

      - name: Rename Artifact
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          src = Path("dist") / ("gcs.exe" if os.name == "nt" else "gcs")
          dst = Path("dist") / "${{ matrix.asset_name }}"
          shutil.copy2(src, dst)
          print(f"artifact: {dst}")
          PY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
