name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            bin_name: gcs-linux-x86_64
            output_file: gcs-linux-x86_64
          - os: windows-latest
            target: windows-x86_64
            bin_name: gcs-windows-x86_64
            output_file: gcs-windows-x86_64.exe
          - os: macos-15-intel
            target: macos-x86_64
            bin_name: gcs-macos-x86_64
            output_file: gcs-macos-x86_64
          - os: macos-15
            target: macos-arm64
            bin_name: gcs-macos-arm64
            output_file: gcs-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller pytest

      - name: Run Tests
        run: |
          python -m pytest tests/test_serve.py tests/test_cli.py

      - name: Build Binary
        run: |
          python -m PyInstaller --clean --onefile --name "${{ matrix.bin_name }}" gcs_main.py

      - name: Smoke Test Binary
        run: |
          ./dist/${{ matrix.output_file }} --version
          ./dist/${{ matrix.output_file }} search --help
          ./dist/${{ matrix.output_file }} serve --help

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.output_file }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
